
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Veranda Da Simona - Luxury Countryside Retreat</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#800020", // Burgundy
            "primary-dark": "#5e0017",
            secondary: "#556b2f", // Olive
            "bg-cream": "#f0e6d2",
            "bg-stone": "#dcd6ce",
            "text-main": "#2c2624",
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            hand: ['"Dancing Script"', 'cursive'],
          },
          keyframes: {
            "fade-in-up": {
              "0%": { opacity: "0", transform: "translateY(30px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          },
          animation: {
            "fade-in-up": "fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1)"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0e6d2; }
    .font-serif { font-family: 'Playfair Display', serif; }
    
    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scroll-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .text-shadow-lg {
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f0e6d2; }
    ::-webkit-scrollbar-thumb { background: #800020; border-radius: 4px; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.42.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-bg-cream text-text-main">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
